name: Update tracker

on:
  push:
    paths:
      - "data/lists/**"
      - "data/symbols.csv"
      - "scripts/**"
  schedule:
    - cron: "30 3 * * 1-5"   # ~09:00 IST — pre-open refresh of global market cues
    - cron: "0 11 * * 1-5"   # ~16:30 IST — post-close follow-up on dropped names
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/process.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json data/paper_log.json
          git diff --cached --quiet || git commit -m "Update tracker data ($(date -u +%F))"
          git push
